<!DOCTYPE html>
<html>
<head>
    <title>Personal Profile Form</title>

    <link rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">

    <style>

        body{
            background-color:#f0f4f8;
        }

        .container{
            margin-top:50px;
            background:white;
            padding:30px;
            border-radius:15px;
            box-shadow:0px 0px 10px gray;
        }

    </style>

</head>

<body>

<div class="container col-md-6">

    <h2 class="text-center mb-4">
        Personal Profile Form
    </h2>

    <form action="ProfileServlet" method="post">

        <div class="mb-3">
            <label>Name</label>
            <input type="text"
                   name="name"
                   class="form-control">
        </div>

        <div class="mb-3">
            <label>Student ID</label>
            <input type="text"
                   name="studentId"
                   class="form-control">
        </div>

        <div class="mb-3">
            <label>Program</label>
            <input type="text"
                   name="program"
                   class="form-control">
        </div>

        <div class="mb-3">
            <label>Email</label>
            <input type="email"
                   name="email"
                   class="form-control">
        </div>

        <div class="mb-3">
            <label>Hobbies</label>
            <input type="text"
                   name="hobbies"
                   class="form-control">
        </div>

        <div class="mb-3">
            <label>Self Introduction</label>

            <textarea name="intro"
                      class="form-control">
            </textarea>

        </div>

        <button type="submit"
                class="btn btn-primary w-100">

            Submit

        </button>

    </form>

</div>

</body>
</html>
